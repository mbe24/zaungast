site_name: zaungast
site_description: A local-first, offline, read-only MCP server for the Microsoft Teams on-disk cache
site_url: https://zaungast.readthedocs.io/
repo_url: https://github.com/mbe24/zaungast
repo_name: mbe24/zaungast
edit_uri: edit/main/docs/
docs_dir: docs
strict: true

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: amber

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Installation: installation.md
  - Tools reference: tools.md
  - How it works: how-it-works.md
  - Configuration: configuration.md
  - Privacy & safety: privacy.md
  - Troubleshooting: troubleshooting.md
  - Development: development.md
  - Browser usage: browser.md
  - Reference:
    - Chromium IndexedDB format: reference/chromium-indexeddb-format.md
