<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="zaungast logo: a figure peeking over a fence with binoculars">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#243560"/>
      <stop offset="60%" stop-color="#2C5B77"/>
      <stop offset="100%" stop-color="#2F7A80"/>
    </linearGradient>
    <linearGradient id="wood" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D8AE6E"/>
      <stop offset="100%" stop-color="#BE8F49"/>
    </linearGradient>
    <linearGradient id="lens" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8BE0F0"/>
      <stop offset="100%" stop-color="#2C9EC2"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="46%" r="55%">
      <stop offset="0%" stop-color="#F2A64B" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#F2A64B" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="badge"><rect x="0" y="0" width="512" height="512" rx="104"/></clipPath>
  </defs>

  <g clip-path="url(#badge)">
    <rect x="0" y="0" width="512" height="512" fill="url(#sky)"/>
    <circle cx="256" cy="236" r="180" fill="url(#glow)"/>

    <!-- fence: dog-ear pickets across the bottom -->
    <g>
      <!-- back rail hint -->
      <rect x="0" y="330" width="512" height="182" fill="#B0863F"/>
      <!-- pickets -->
      <g fill="url(#wood)" stroke="#9A7238" stroke-width="3">
        <path d="M22 316 l18 -18 l38 0 l18 18 v196 h-92 z"/>
        <path d="M120 316 l18 -18 l38 0 l18 18 v196 h-92 z"/>
        <path d="M218 316 l18 -18 l38 0 l18 18 v196 h-92 z"/>
        <path d="M316 316 l18 -18 l38 0 l18 18 v196 h-92 z"/>
        <path d="M414 316 l18 -18 l38 0 l18 18 v196 h-92 z"/>
      </g>
      <!-- grain -->
      <g stroke="#A67C3B" stroke-width="2.5" opacity="0.55" stroke-linecap="round">
        <line x1="52" y1="326" x2="52" y2="500"/>
        <line x1="150" y1="330" x2="150" y2="498"/>
        <line x1="248" y1="326" x2="248" y2="500"/>
        <line x1="346" y1="330" x2="346" y2="498"/>
        <line x1="444" y1="326" x2="444" y2="500"/>
      </g>
    </g>

    <!-- peeker: hands, binoculars, hat -->
    <g>
      <!-- hands gripping the barrels, rising from behind the fence -->
      <path d="M150 300 q-26 4 -30 40 q-2 26 22 30 l34 -6 z" fill="#E7B98A" stroke="#C98F5E" stroke-width="3"/>
      <path d="M362 300 q26 4 30 40 q2 26 -22 30 l-34 -6 z" fill="#E7B98A" stroke="#C98F5E" stroke-width="3"/>

      <!-- binoculars -->
      <g stroke="#22232B" stroke-width="4">
        <rect x="168" y="250" width="72" height="86" rx="20" fill="#33343E"/>
        <rect x="272" y="250" width="72" height="86" rx="20" fill="#33343E"/>
        <rect x="234" y="266" width="44" height="30" rx="10" fill="#3E3F4A"/>
      </g>
      <circle cx="204" cy="330" r="30" fill="url(#lens)" stroke="#1E1F26" stroke-width="5"/>
      <circle cx="308" cy="330" r="30" fill="url(#lens)" stroke="#1E1F26" stroke-width="5"/>
      <circle cx="194" cy="320" r="8" fill="#FFFFFF" opacity="0.85"/>
      <circle cx="298" cy="320" r="8" fill="#FFFFFF" opacity="0.85"/>

      <!-- bucket/safari hat over the top -->
      <ellipse cx="256" cy="250" rx="126" ry="30" fill="#EFE3C7" stroke="#C99A54" stroke-width="4"/>
      <path d="M164 250 q6 -96 92 -96 q86 0 92 96 z" fill="#EFE3C7" stroke="#C99A54" stroke-width="4"/>
      <path d="M172 232 q84 -26 168 0" fill="none" stroke="#C99A54" stroke-width="7" stroke-linecap="round"/>
    </g>
  </g>
</svg>
