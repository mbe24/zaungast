name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  verify-ci:
    name: Verify tag and CI status
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v5

      - name: Validate tag format
        shell: bash
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z]+)*$ ]]; then
            echo "Release tag '${GITHUB_REF_NAME}' is invalid (expected e.g. v0.1.0)."
            exit 1
          fi

      - name: Ensure published package versions match release tag
        shell: bash
        env:
          SHIP_NATIVE: ${{ vars.SHIP_NATIVE }}
        # Gate the packages that are ACTUALLY published (libzaungast + zaungast), not the
        # monorepo root — a tag vX.Y.Z must mean both are at X.Y.Z. When native shipping is on
        # (SHIP_NATIVE=true) libzaungast-native ships in version lockstep, so it must match too.
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          pkgs=(libzaungast zaungast)
          # Only the exact string 'true' opts in; 'false'/unset opt out; anything else (TRUE, 1, yes)
          # is a misconfigured variable we fail on rather than silently treat as off.
          case "${SHIP_NATIVE:-false}" in
            true) pkgs+=(libzaungast-native) ;;
            false | "") ;;
            *)
              echo "Ambiguous SHIP_NATIVE value '${SHIP_NATIVE}': expected 'true' or 'false'."
              exit 1
              ;;
          esac
          for pkg in "${pkgs[@]}"; do
            v="$(node -p "require('./packages/${pkg}/package.json').version")"
            if [[ "${v}" != "${tag_version}" ]]; then
              echo "Version mismatch: tag ${tag_version} vs packages/${pkg} ${v}."
              exit 1
            fi
          done

      - name: Resolve tagged commit SHA
        id: commit
        shell: bash
        run: echo "sha=$(git rev-parse HEAD^{commit})" >> "$GITHUB_OUTPUT"

      - name: Wait for a successful CI run for this commit
        # The tagged commit was already built + fully tested by ci.yml on push; this GATES on that
        # green run rather than re-testing. The build job below compiles once only to produce the dist
        # to publish (not to re-validate).
        uses: actions/github-script@v8
        env:
          COMMIT_SHA: ${{ steps.commit.outputs.sha }}
        with:
          script: |
            const sha = process.env.COMMIT_SHA;
            const pollMs = 15_000;
            const appearDeadline = Date.now() + 3 * 60_000;
            const concludeDeadline = Date.now() + 25 * 60_000;
            const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
            const latestRun = async () => {
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner, repo: context.repo.repo,
                workflow_id: "ci.yml", head_sha: sha, per_page: 100,
              });
              return data.workflow_runs[0] ?? null;
            };
            let run = await latestRun();
            while (run === null && Date.now() < appearDeadline) { core.info(`waiting for CI run for ${sha}...`); await sleep(pollMs); run = await latestRun(); }
            if (run === null) { core.setFailed(`No CI run appeared for ${sha}. Push the commit to main first.`); return; }
            core.info(`CI run: ${run.html_url}`);
            while (run.status !== "completed" && Date.now() < concludeDeadline) { core.info(`CI status: ${run.status}...`); await sleep(pollMs); run = await latestRun(); }
            if (run.status !== "completed") { core.setFailed(`CI did not finish in time. ${run.html_url}`); return; }
            if (run.conclusion !== "success") { core.setFailed(`CI concluded '${run.conclusion}', not success. ${run.html_url}`); return; }
            core.info("CI green — publish may proceed.");

  build:
    name: Build once
    needs: verify-ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build once (libzaungast then zaungast)
        run: npm run build
      # Tar the dist trees so upload-artifact@v4 doesn't strip the packages/*/dist path prefix; the
      # publish jobs untar at repo root to restore exact paths. libzaungast's dist carries its copied
      # schema assets (schema.sql, schema/versions/*.json, mappings.json) + declarations.
      - name: Package dist artifacts
        run: tar czf dist-artifacts.tgz packages/libzaungast/dist packages/zaungast/dist
      - uses: actions/upload-artifact@v4
        with:
          name: dist-artifacts
          path: dist-artifacts.tgz
          retention-days: 7
          if-no-files-found: error

  # Publish libzaungast FIRST — zaungast depends on it. Publishes from the restored dist (no rebuild,
  # no npm ci — packing only reads files, and neither package has a prepare/prepack/prepublishOnly
  # hook). Idempotent: if this exact version is already live, skip instead of failing on "cannot
  # publish over an existing version", so a re-run converges (npm version publishes are atomic).
  publish-libzaungast:
    name: Publish libzaungast
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC for npm --provenance
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - uses: actions/download-artifact@v4
        with:
          name: dist-artifacts
      - name: Restore dist
        run: tar xzf dist-artifacts.tgz
      - name: Publish libzaungast (idempotent, with provenance)
        working-directory: packages/libzaungast
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          ver="$(node -p "require('./package.json').version")"
          if npm view "libzaungast@${ver}" version >/dev/null 2>&1; then
            echo "libzaungast@${ver} already published — skipping."
          else
            npm publish --provenance --access public
          fi

  # Then zaungast — runs only if publish-libzaungast succeeded. No registry poll: by the time this job
  # checks out + restores dist, libzaungast has long since propagated (npm is read-your-writes within
  # seconds). Same idempotent skip so a full re-run of a completed release doesn't false-fail.
  publish-zaungast:
    name: Publish zaungast
    needs: publish-libzaungast
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC for npm --provenance
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - uses: actions/download-artifact@v4
        with:
          name: dist-artifacts
      - name: Restore dist
        run: tar xzf dist-artifacts.tgz
      - name: Use the repo README as zaungast's package README
        # The root README IS zaungast's doc; npm only reads a README from the package dir, so copy it
        # in at publish time (no committed duplicate to keep in sync).
        run: cp README.md packages/zaungast/README.md
      - name: Publish zaungast (idempotent, with provenance)
        working-directory: packages/zaungast
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          ver="$(node -p "require('./package.json').version")"
          if npm view "zaungast@${ver}" version >/dev/null 2>&1; then
            echo "zaungast@${ver} already published — skipping."
          else
            npm publish --provenance --access public
          fi

  # ── Native prebuilts (DORMANT) ─────────────────────────────────────────────────────────────────
  # The two jobs below ship the optional Rust accelerator as napi prebuilt packages (a main package
  # whose optionalDependencies point at one small package per platform, each carrying a prebuilt
  # .node). They are fully wired but DORMANT: both run only when the repository variable
  # SHIP_NATIVE == 'true'. Until then they are skipped (green, not failed).
  #
  # The JS release above is entirely independent — its jobs never `needs:` a native job, so a skipped
  # (or failed) native leg can neither block nor trigger the libzaungast/zaungast publish. Native hangs
  # off verify-ci; publish depends additionally on publish-libzaungast (so a consumer resolving the new
  # main package finds its libzaungast peer already live).
  #
  # To ship native: (1) get all legs green on native.yml (manual), (2) set repo variable
  # SHIP_NATIVE=true (Settings → Secrets and variables → Actions → Variables), (3) tag as usual. That
  # single variable is the only switch — versions are already in lockstep and verify-ci checks them.
  build-native-prebuilts:
    name: Build native prebuilt (${{ matrix.target }} on ${{ matrix.os }})
    needs: verify-ci
    if: ${{ vars.SHIP_NATIVE == 'true' }}
    strategy:
      fail-fast: false
      # KEEP IN LOCKSTEP with native.yml's matrix — check:native-triples asserts the two are identical
      # and that EXPECTED_PREBUILTS below equals this leg count.
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      # Build + prove byte-equal on this platform with the SAME composite action native.yml uses, then
      # keep the .node it produced — a shipped prebuilt is exactly what the manual matrix already proved.
      - uses: ./.github/actions/build-native
      - name: Stage the prebuilt addon
        shell: bash
        working-directory: packages/libzaungast-native
        run: |
          set -euo pipefail
          mkdir -p prebuilds
          # napi build emitted libzaungast-native.<triple>.node in the package root; stage exactly one.
          count="$(ls -1 ./*.node 2>/dev/null | wc -l)"
          if [[ "${count}" -ne 1 ]]; then
            echo "Expected exactly one .node after build, found ${count}:"
            ls -l ./*.node || true
            exit 1
          fi
          cp ./*.node prebuilds/
      - uses: actions/upload-artifact@v4
        with:
          name: native-prebuilt-${{ matrix.target }}
          path: packages/libzaungast-native/prebuilds/*.node
          retention-days: 7
          if-no-files-found: error

  publish-libzaungast-native:
    name: Publish libzaungast-native (main + per-platform prebuilts)
    needs: [build-native-prebuilts, publish-libzaungast]
    if: ${{ vars.SHIP_NATIVE == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC for npm --provenance
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/libzaungast-native
      - name: Install dependencies
        run: npm ci
      # The main tarball ships dist/ + index.cjs + index.d.ts — all generated (gitignored), none present
      # after a bare checkout — so build them HERE. libzaungast first (the shim's tsc needs its types),
      # then the native package: napi build emits the generated CJS loader (index.cjs) + its .d.ts, and
      # tsc emits the shim's dist/. The locally-built .node is excluded from `files` (prebuilts ship in
      # the per-platform packages), so this build produces the loader + shim, not a shipped binary.
      - name: Build main-package content (loader + shim)
        run: |
          set -euo pipefail
          npm run build
          npm run build --workspace libzaungast-native
      # Gather every leg's prebuilt into the package's ./artifacts dir (napi's default input location).
      - uses: actions/download-artifact@v4
        with:
          path: packages/libzaungast-native/artifacts
          pattern: native-prebuilt-*
          merge-multiple: true
      - name: Assemble per-platform packages + wire optionalDependencies
        working-directory: packages/libzaungast-native
        env:
          # = number of build-native-prebuilts matrix legs; the wiring script fails if fewer prebuilts
          # arrive. check:native-triples asserts this equals the matrix leg count.
          EXPECTED_PREBUILTS: '4'
        run: |
          set -euo pipefail
          # Generate the stub package.json for every napi.triple, then drop each triple's prebuilt into
          # its stub dir. The stubs are generated here and never committed, so package-lock.json stays
          # unchanged and `npm ci` never tries to resolve an unpublished platform package.
          npx --no-install napi create-npm-dir -t .
          npx --no-install napi artifacts -d artifacts
          # Wire main.optionalDependencies from the stubs that got a prebuilt; drop the rest (Intel-mac).
          node ../../scripts/native-wire-optional-deps.mjs
      - name: Publish per-platform packages, then the main package (idempotent, with provenance)
        working-directory: packages/libzaungast-native
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Satisfies the package's prepublishOnly guard — set ONLY by this gated step, so a manual or
          # workspace-wide `npm publish` still refuses to publish native by accident.
          ZAUNGAST_SHIP_NATIVE: '1'
        run: |
          set -euo pipefail
          # Platform packages FIRST: the main package's optionalDependencies must be resolvable the
          # instant it goes live. Same idempotent skip-if-already-published as the JS packages.
          for d in npm/*/; do
            name="$(node -p "require('./${d}package.json').name")"
            ver="$(node -p "require('./${d}package.json').version")"
            if npm view "${name}@${ver}" version >/dev/null 2>&1; then
              echo "${name}@${ver} already published — skipping."
            else
              (cd "${d}" && npm publish --provenance --access public)
            fi
          done
          # Then the main package (carries the generated index.cjs loader + wired optionalDependencies).
          ver="$(node -p "require('./package.json').version")"
          if npm view "libzaungast-native@${ver}" version >/dev/null 2>&1; then
            echo "libzaungast-native@${ver} already published — skipping."
          else
            npm publish --provenance --access public
          fi
