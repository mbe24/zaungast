name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          # node:sqlite (used for the in-memory index) needs Node >= 22.5.
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: Fixture integration test
        run: npm run test:fixture
        # Generates a synthetic leveldb cache (no PII) and drives the full read -> ingest ->
        # tools pipeline against it. The mutation/equivalence suites (npm run test:integration)
        # still need a real local Teams cache with .ldb tables and run on a developer machine.
