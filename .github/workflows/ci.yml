name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  test:
    name: TypeScript (format · typecheck · vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          # node:sqlite (used for the in-memory index) needs Node >= 22.5.
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check
        # Prettier enforces formatting. (eslint is deferred: typescript-eslint doesn't yet
        # support TypeScript 7 — see docs/development.md.)

      - name: Typecheck
        run: npm run typecheck

      - name: Typecheck tests
        run: npm run typecheck:test

      - name: Native triples consistency (native.yml ⊆ napi.triples)
        run: npm run check:native-triples

      - name: Dependency-direction guard (libzaungast must not import the MCP server)
        run: npm run check:deps

      - name: Test-naming guard (every test file carries a role suffix vitest will run)
        run: npm run check:test-naming
        # vitest discovers tests by include-glob, so a mis-suffixed file would be silently skipped.
        # This asserts every packages/*/test/**/*.ts is classified (.unit/.fixture/.golden/.int/.real).

      - name: Timings schema self-test (TS half of the shared percentile vector)
        run: npm run test:schema

      - name: Build
        run: npm run build

      - name: Browser bundle smoke (./web bundles for the browser with no node: builtins)
        run: npm run check:web-bundle
        # Tripwire: reintroduce node:fs/node:path anywhere reachable from the ./web entry and the
        # browser bundle fails here (esbuild --platform=browser), long before a user's browser.

      - name: Unit tests
        run: npm test

      - name: Fixture integration test
        run: npm run test:fixture
        # Generates a synthetic leveldb cache (no PII) and drives the full read -> ingest ->
        # tools pipeline against it.

      - name: Integration suite (synthetic fixture)
        run: npm run test:integration:ci
        # The vitest `int` project. With no ZAUNGAST_TEST_DIR, the synthetic-capable suites
        # (incremental/reuse == full rebuild, compaction, tombstones; feedback e2e) generate their own
        # .ldb+.log fixture and run; the real-cache-only suites self-skip (green). Locally,
        # `npm run test:integration` with ZAUNGAST_TEST_DIR set runs them all against a real cache.

      - name: Golden tests (synthetic fixture)
        run: npm run test:golden
        # Freezes decode/extract output + MCP tool output over the synthetic fixture. The extract
        # golden pins the fixture's schema fingerprint, so a change to the fingerprint algorithm
        # flips the hash and fails here — the drift signal that silently rotted a stale
        # knownFingerprint before. PII-free (synthetic); test:golden:real stays local (real cache).

      - name: Browser-condition tests (happy-dom + web #bytes codec)
        run: npm run test:browser
        # Re-runs the codec vectors (bytes/hash) + seam-parity under resolve.conditions:['browser'],
        # so `#bytes` binds to the hand-rolled web codec — catches a "green on Node, broken in the
        # browser" divergence that the node-condition suites can't see.

  rust:
    name: Rust (fmt · clippy · unit)
    runs-on: ubuntu-latest
    # CI is an unconstrained Linux box, so cargo runs natively here (unlike the maintainer's host,
    # which blocks native build/exec and falls back to Docker). This is the gate that was missing:
    # a Rust regression / clippy violation / broken unit test used to merge — and release — green,
    # because cargo lived only in the manual native.yml. This runs on every push/PR to main.
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          # check:native is a node script (no deps) — used here so the fmt+clippy invocation has a
          # single source of truth shared with local dev, rather than duplicated in YAML.
          node-version: "22"

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/libzaungast-native

      - name: Rust fmt + clippy (pedantic) — same gate as local `npm run check:native`
        run: npm run check:native
        env:
          ZAUNGAST_NATIVE_RUNNER: local # cargo builds natively on the CI runner; no Docker fallback

      - name: Rust unit tests + profiler percentile parity (pure; ZAUNGAST_TEST_DIR-gated tests skip)
        working-directory: packages/libzaungast-native
        # --bin profile also runs the shared percentile vector test (native half); the harness feature
        # is required to compile that bin. The env-gated reuse/refresh parity tests still skip w/o a cache.
        run: cargo test --release --features harness --lib --bin profile
