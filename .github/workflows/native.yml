name: Native engine

# Builds the optional Rust accelerator (libzaungast-native) as a Node addon on each native runner,
# then runs the fixture + golden suites on the NATIVE engine — injected through zaungast's engine
# selection (ZAUNGAST_ENGINE=native → createNativeEngine → the .node), so the native path is proven
# byte-equal to the JS-generated goldens on every supported platform. This is the ONLY gate that
# exercises the napi FFI + the generated addon loader end-to-end (the byte-differential harness runs
# the standalone Rust bins, which bypass both). Matrix = the 5 targets we build prebuilts for.

# Manual-only: the native accelerator is optional/opt-in and can't be validated on the maintainer's
# machine (endpoint policy blocks native builds), so this doesn't gate normal pushes/PRs. Run it by
# hand from the Actions tab when you want to build the .node + check the dual-engine golden.
on:
  workflow_dispatch:

jobs:
  build-and-verify:
    name: Build addon + dual-engine golden (${{ matrix.target }} on ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          # node:sqlite (the ChatStore) needs Node >= 22.5.
          node-version: "22"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/libzaungast-native

      - name: Install dependencies
        run: npm ci

      - name: macOS deployment target
        if: runner.os == 'macOS'
        run: echo "MACOSX_DEPLOYMENT_TARGET=11.0" >> "$GITHUB_ENV"

      - name: Rust unit tests (incl. the ISO-8601 / Date.parse parity golden)
        working-directory: packages/libzaungast-native
        run: cargo test --release --lib

      - name: Build TS
        run: npm run build

      - name: Build native addon (.node) + TS shim + generated loader
        working-directory: packages/libzaungast-native
        run: npm run build
        # napi build emits libzaungast-native.<triple>.node + the generated CJS loader (index.cjs) +
        # the shim's dist/. As a workspace member the package is symlinked into node_modules, so
        # createNativeEngine() loads index.cjs → the colocated .node.

      - name: Sanity — native engine constructs (loader + FFI + conformance)
        # Import the SHIM (dist build) and construct the engine: this loads index.cjs → the .node and
        # runs the conformance handshake. { unavailable } here means the loader/FFI/handshake failed.
        run: node --experimental-sqlite --input-type=module -e "const { createNativeEngine } = await import('libzaungast-native'); const e = createNativeEngine(); if ('unavailable' in e) { console.error('native unavailable:', e.unavailable); process.exit(1); } console.log('native engine ready (full + refresh)');"

      - name: Fixture suite — JS engine (baseline)
        run: npm run test:fixture
        env:
          ZAUNGAST_ENGINE: js

      - name: Fixture suite — NATIVE engine (must equal JS)
        run: npm run test:fixture
        env:
          ZAUNGAST_ENGINE: native

      - name: Golden suite — NATIVE engine (must equal JS-generated goldens)
        run: npm run test:golden
        env:
          ZAUNGAST_ENGINE: native
        # zaungast's selectEngine() honors ZAUNGAST_ENGINE and INJECTS createNativeEngine() into the
        # fixture/golden opens, so this exercises the native full-ingest path (loader + FFI) against the
        # committed goldens. Incremental (seqCap) tests aren't in these suites — native full only.
