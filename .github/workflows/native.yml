name: Native engine

# Builds the optional Rust accelerator (libzaungast-native) as a Node addon on each native runner,
# then runs the fixture + golden suites TWICE — once on the JS engine, once on the native engine —
# so the native path is proven byte-equal to the TS reference on every supported platform. The full
# cross-target prebuild matrix (musl, aarch64, …) for publishing is a release concern; this job
# covers the three host platforms a developer/CI actually runs on.

# Manual-only: the native accelerator is optional/opt-in and can't be validated on the maintainer's
# machine (endpoint policy blocks native builds), so this doesn't gate normal pushes/PRs. Run it by
# hand from the Actions tab when you want to build the .node + check the dual-engine golden.
on:
  workflow_dispatch:

jobs:
  build-and-verify:
    name: Build addon + dual-engine golden (${{ matrix.target }} on ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          # node:sqlite (the ChatStore) needs Node >= 22.5.
          node-version: "22"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/libzaungast-native

      - name: Install dependencies
        run: npm ci

      - name: macOS deployment target
        if: runner.os == 'macOS'
        run: echo "MACOSX_DEPLOYMENT_TARGET=11.0" >> "$GITHUB_ENV"

      - name: Rust unit tests (incl. the ISO-8601 / Date.parse parity golden)
        working-directory: packages/libzaungast-native
        run: cargo test --release --lib

      - name: Build TS
        run: npm run build

      - name: Build native addon (.node)
        working-directory: packages/libzaungast-native
        run: npm run build
        # napi-rs emits libzaungast-native.<triple>.node here; as a workspace member it is symlinked
        # into node_modules, so libzaungast's loader (index.js) finds it and ZAUNGAST_ENGINE=native
        # resolves the addon.

      - name: Sanity — addon loads and reports conformance
        run: node -e "const n=require('libzaungast-native');if(typeof n.conformanceVersion()!=='number')process.exit(1);console.log('conformance',n.conformanceVersion())"

      - name: Fixture suite — JS engine
        run: npm run test:fixture
        env:
          ZAUNGAST_ENGINE: js

      - name: Fixture suite — NATIVE engine (must equal JS)
        run: npm run test:fixture
        env:
          ZAUNGAST_ENGINE: native

      - name: Golden suite — NATIVE engine (must equal JS-generated goldens)
        run: npm run test:golden
        env:
          ZAUNGAST_ENGINE: native
        # resolveEngine() honors ZAUNGAST_ENGINE for every ingest() call (incl. the MCP's Session),
        # so this exercises the native full-ingest path against the committed goldens. Partial builds
        # (seqCap, the incremental tests) always force JS — native has no incremental path yet.
