name: Native engine

# Builds the optional Rust accelerator (libzaungast-native) as a Node addon on each native runner,
# then runs the fixture + golden suites on the NATIVE engine — injected through zaungast's engine
# selection (ZAUNGAST_ENGINE=native → createNativeEngine → the .node), so the native path is proven
# byte-equal to the JS-generated goldens on every supported platform. This is the ONLY gate that
# exercises the napi FFI + the generated addon loader end-to-end (the byte-differential harness runs
# the standalone Rust bins, which bypass both). The build+verify sequence lives in the shared composite
# action (.github/actions/build-native) so this, native-gate.yml, and release.yml stay in lockstep.
#
# Matrix = the four triples we ship prebuilts for. x86_64-apple-darwin is NOT here: there are no free
# Intel-mac runners and Intel-mac installs fall back to the JS engine, so it stays a local-only build
# (present in napi.triples for `napi build` on a developer's Intel Mac). check:native-triples asserts
# this matrix ⊆ napi.triples, which permits that extra.

# Manual-only: the native accelerator is optional/opt-in and can't be validated on the maintainer's
# machine (endpoint policy blocks native builds), so this doesn't gate normal pushes/PRs. Run it by
# hand from the Actions tab when you want to build the .node + check the dual-engine golden. (The
# lighter auto gate on PRs that touch native code is native-gate.yml, behind the NATIVE_CI variable.)
on:
  workflow_dispatch:

jobs:
  build-and-verify:
    name: Build addon + dual-engine golden (${{ matrix.target }} on ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/build-native
