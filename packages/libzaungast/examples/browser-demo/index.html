<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <title>libzaungast/web POC</title>
    <style>
      body {
        font: 14px/1.5 system-ui, sans-serif;
        margin: 2rem;
        max-width: 900px;
      }
      button {
        font: inherit;
        padding: 0.5rem 1rem;
        margin-right: 0.5rem;
        cursor: pointer;
      }
      pre {
        background: #f4f4f4;
        padding: 1rem;
        border-radius: 6px;
        overflow-x: auto;
        white-space: pre-wrap;
        margin-top: 1rem;
      }
      .note {
        color: #666;
      }
    </style>
  </head>
  <body>
    <h1>libzaungast/web — browser integration POC</h1>
    <p class="note">
      Everything runs locally in your browser (in a Web Worker); nothing is uploaded. Point it at your
      <code>…indexeddb.leveldb</code> folder — or a copy if Teams is running.
    </p>

    <div class="controls">
      <button id="selftest">Self-test (no data)</button>
      <button id="pickBtn">Pick Teams cache folder…</button>
      <!-- Hidden real input (webkitdirectory: folder pick, cross-browser); the button triggers it. -->
      <input id="pick" type="file" webkitdirectory hidden />
    </div>

    <pre id="out"></pre>

    <script type="module" src="./main.js"></script>
  </body>
</html>
